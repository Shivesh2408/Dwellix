spring:
  application:
    name: dwellix-backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:mock-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:mock-google-client-secret}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:3000}
  jwt:
    issuer: dwellix-auth
    secret: ${JWT_SECRET:ZGV2ZWxvcG1lbnQtZGV2ZWxvcG1lbnQtZGV2ZWxvcG1lbnQtZGV2ZWxvcG1lbnQtMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NQ==}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800}
  auth:
    require-email-verification: ${AUTH_REQUIRE_EMAIL_VERIFICATION:false}
    cookies:
      refresh-token-name: ${AUTH_REFRESH_COOKIE_NAME:dwellix_refresh_token}
      refresh-token-path: ${AUTH_REFRESH_COOKIE_PATH:/api/v1/auth}
      secure: ${AUTH_COOKIE_SECURE:false}
      httpOnly: true
      sameSite: ${AUTH_COOKIE_SAMESITE:Lax}
      refresh-token-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800}
  rate-limit:
    max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
    window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
  ai:
    openrouter:
      api-key: ${OPENROUTER_API_KEY}
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}

logging:
  level:
    root: INFO
    com.dwellix.auth: INFO
